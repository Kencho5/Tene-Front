<!-- Mobile: Amazon-style account grid -->
<div class="mt-4 lg:hidden">
  <div class="border-hairline mb-4 flex items-center gap-3 rounded-xl border bg-white p-4">
    <div class="bg-green-10 text-green-70 flex h-11 w-11 shrink-0 items-center justify-center rounded-full font-semibold uppercase">
      {{ initials() }}
    </div>
    <div class="min-w-0">
      <h2 class="text-platinum-100 truncate text-sm font-semibold">{{ authService.user()?.name }}</h2>
      <p class="text-platinum-50 truncate text-xs">{{ authService.user()?.email }}</p>
    </div>
  </div>

  <div class="grid grid-cols-2 gap-3">
    <a
      routerLink="/profile/orders"
      class="border-hairline flex flex-col gap-3 rounded-xl border bg-white p-4 transition-colors"
      routerLinkActive="!border-green-30 !bg-green-10"
    >
      <span class="bg-green-10 text-green-70 flex h-10 w-10 items-center justify-center rounded-lg">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
          <path d="M9 8H15M9 12H15M18 20L15 17L12 20L9 17L6 20V5.5C6 4.67157 6.67157 4 7.5 4H16.5C17.3284 4 18 4.67157 18 5.5V20Z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
      </span>
      <div>
        <p class="text-platinum-100 text-sm font-semibold">შეკვეთები</p>
        <p class="text-platinum-50 mt-0.5 text-xs">შენი შეკვეთების ისტორია</p>
      </div>
    </a>
    <a
      routerLink="/profile/addresses"
      class="border-hairline flex flex-col gap-3 rounded-xl border bg-white p-4 transition-colors"
      routerLinkActive="!border-green-30 !bg-green-10"
    >
      <span class="bg-green-10 text-green-70 flex h-10 w-10 items-center justify-center rounded-lg">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
          <path d="M18.7312 10.8148C18.7312 14.4197 15.5789 17.6744 13.5622 19.3877C12.6013 20.2041 11.2315 20.2041 10.2705 19.3877C8.25381 17.6743 5.10156 14.4197 5.10156 10.8148C5.10156 9.00741 5.81955 7.27404 7.09757 5.99601C8.3756 4.71799 10.109 4 11.9164 4C13.7238 4 15.4571 4.71799 16.7352 5.99601C18.0132 7.27404 18.7312 9.00741 18.7312 10.8148Z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
          <path d="M11.9164 13.0864C13.1709 13.0864 14.188 12.0694 14.188 10.8148C14.188 9.56024 13.1709 8.54321 11.9164 8.54321C10.6618 8.54321 9.64477 9.56024 9.64477 10.8148C9.64477 12.0694 10.6618 13.0864 11.9164 13.0864Z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
      </span>
      <div>
        <p class="text-platinum-100 text-sm font-semibold">მისამართები</p>
        <p class="text-platinum-50 mt-0.5 text-xs">მიწოდების მისამართები</p>
      </div>
    </a>
  </div>

  <button
    type="button"
    class="text-valencia-70 mt-4 flex w-full items-center justify-center gap-2 rounded-xl border border-valencia-20 bg-white py-3 text-sm font-medium"
    (click)="authService.logout()"
  >
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
      <path d="M9.33333 20H7C5.34315 20 4 18.6569 4 17V7C4 5.34315 5.34315 4 7 4H9.33333M15.5556 16.4444L20 12M20 12L15.5556 7.55556M20 12H10.3333" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
    </svg>
    გამოსვლა
  </button>
</div>

<!-- Desktop: vertical sidebar -->
<div class="hidden w-full lg:block">
  <div class="mb-4 flex items-center gap-3 px-2">
    <div class="bg-green-10 text-green-70 flex h-10 w-10 shrink-0 items-center justify-center rounded-full font-semibold uppercase">
      {{ initials() }}
    </div>
    <div class="min-w-0">
      <h2 class="text-platinum-100 truncate text-sm font-semibold">{{ authService.user()?.name }}</h2>
      <p class="text-platinum-50 truncate text-xs">{{ authService.user()?.email }}</p>
    </div>
  </div>

  <nav class="flex flex-col gap-0.5">
    <a
      routerLink="/profile/orders"
      class="text-platinum-60 hover:bg-surface-20 flex items-center gap-3 rounded-lg px-3 py-2 text-sm font-medium transition-colors"
      routerLinkActive="!bg-surface-20 !text-platinum-100"
    >
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
        <path d="M9 8H15M9 12H15M18 20L15 17L12 20L9 17L6 20V5.5C6 4.67157 6.67157 4 7.5 4H16.5C17.3284 4 18 4.67157 18 5.5V20Z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
      </svg>
      შეკვეთები
    </a>
    <a
      routerLink="/profile/addresses"
      class="text-platinum-60 hover:bg-surface-20 flex items-center gap-3 rounded-lg px-3 py-2 text-sm font-medium transition-colors"
      routerLinkActive="!bg-surface-20 !text-platinum-100"
    >
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
        <path d="M18.7312 10.8148C18.7312 14.4197 15.5789 17.6744 13.5622 19.3877C12.6013 20.2041 11.2315 20.2041 10.2705 19.3877C8.25381 17.6743 5.10156 14.4197 5.10156 10.8148C5.10156 9.00741 5.81955 7.27404 7.09757 5.99601C8.3756 4.71799 10.109 4 11.9164 4C13.7238 4 15.4571 4.71799 16.7352 5.99601C18.0132 7.27404 18.7312 9.00741 18.7312 10.8148Z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
        <path d="M11.9164 13.0864C13.1709 13.0864 14.188 12.0694 14.188 10.8148C14.188 9.56024 13.1709 8.54321 11.9164 8.54321C10.6618 8.54321 9.64477 9.56024 9.64477 10.8148C9.64477 12.0694 10.6618 13.0864 11.9164 13.0864Z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
      </svg>
      მისამართები
    </a>

    <div class="bg-hairline my-1.5 h-px"></div>

    <button
      type="button"
      class="text-valencia-70 hover:bg-valencia-10 flex w-full items-center gap-3 rounded-lg px-3 py-2 text-sm font-medium transition-colors"
      (click)="authService.logout()"
    >
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
        <path d="M9.33333 20H7C5.34315 20 4 18.6569 4 17V7C4 5.34315 5.34315 4 7 4H9.33333M15.5556 16.4444L20 12M20 12L15.5556 7.55556M20 12H10.3333" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
      </svg>
      გამოსვლა
    </button>
  </nav>
</div>
