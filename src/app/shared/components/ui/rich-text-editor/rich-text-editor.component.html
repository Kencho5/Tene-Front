<div
  class="overflow-hidden rounded-xl border bg-white"
  [class.border-valencia-50]="invalid()"
  [class.border-hairline-strong]="!invalid()"
>
  <!-- Toolbar -->
  <div class="flex flex-wrap items-center gap-0.5 border-b border-hairline bg-platinum-10/40 px-2 py-1.5">
    <button type="button" (click)="toggleBold()" [class.is-active]="isActive('bold')" class="rte-btn font-semibold" aria-label="Bold">B</button>
    <button type="button" (click)="toggleItalic()" [class.is-active]="isActive('italic')" class="rte-btn italic" aria-label="Italic">I</button>

    <span class="mx-1 h-5 w-px bg-hairline"></span>

    <button type="button" (click)="toggleHeading(2)" [class.is-active]="isActive('heading', { level: 2 })" class="rte-btn text-xs font-bold" aria-label="Heading 2">H2</button>
    <button type="button" (click)="toggleHeading(3)" [class.is-active]="isActive('heading', { level: 3 })" class="rte-btn text-xs font-bold" aria-label="Heading 3">H3</button>

    <span class="mx-1 h-5 w-px bg-hairline"></span>

    <button type="button" (click)="toggleBulletList()" [class.is-active]="isActive('bulletList')" class="rte-btn" aria-label="Bullet list">
      <svg width="16" height="16" viewBox="0 0 20 20" fill="none"><circle cx="4" cy="6" r="1.3" fill="currentColor"/><circle cx="4" cy="10" r="1.3" fill="currentColor"/><circle cx="4" cy="14" r="1.3" fill="currentColor"/><path d="M8 6h9M8 10h9M8 14h9" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
    </button>
    <button type="button" (click)="toggleOrderedList()" [class.is-active]="isActive('orderedList')" class="rte-btn" aria-label="Ordered list">
      <svg width="16" height="16" viewBox="0 0 20 20" fill="none"><path d="M8 6h9M8 10h9M8 14h9" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/><text x="2" y="8" font-size="6" fill="currentColor">1</text><text x="2" y="12.5" font-size="6" fill="currentColor">2</text><text x="2" y="17" font-size="6" fill="currentColor">3</text></svg>
    </button>
    <button type="button" (click)="toggleBlockquote()" [class.is-active]="isActive('blockquote')" class="rte-btn" aria-label="Quote">
      <svg width="16" height="16" viewBox="0 0 20 20" fill="none"><path d="M7 5C5 5 4 6.5 4 8.5C4 10.5 5.5 11.5 7 11.5C7 13 6 14 4.5 14.5M16 5C14 5 13 6.5 13 8.5C13 10.5 14.5 11.5 16 11.5C16 13 15 14 13.5 14.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>

    <span class="mx-1 h-5 w-px bg-hairline"></span>

    <button type="button" (click)="setLink()" [class.is-active]="isActive('link')" class="rte-btn" aria-label="Link">
      <svg width="16" height="16" viewBox="0 0 20 20" fill="none"><path d="M8.5 11.5L11.5 8.5M7.5 13.5L6 15C4.6 16.4 2.6 16.4 1.2 15C-0.2 13.6 -0.2 11.6 1.2 10.2L2.7 8.7M12.5 6.5L14 5C15.4 3.6 17.4 3.6 18.8 5C20.2 6.4 20.2 8.4 18.8 9.8L17.3 11.3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" transform="translate(0.5 0.5)"/></svg>
    </button>
    @if (uploadHandler()) {
      <button type="button" (click)="triggerFilePicker()" [disabled]="uploading()" class="rte-btn disabled:opacity-50" aria-label="სურათის ატვირთვა">
        <svg width="16" height="16" viewBox="0 0 20 20" fill="none"><rect x="3" y="4" width="14" height="12" rx="2" stroke="currentColor" stroke-width="1.4"/><circle cx="7.5" cy="8" r="1.3" stroke="currentColor" stroke-width="1.2"/><path d="M4 14l4-4 3 3 2-2 3 3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <input #fileInput type="file" multiple [accept]="acceptList" (change)="onFilesPicked($event)" class="hidden" />
    }
    <button type="button" (click)="addYoutube()" class="rte-btn" aria-label="YouTube ვიდეო">
      <svg width="16" height="16" viewBox="0 0 20 20" fill="none"><rect x="2.5" y="5" width="15" height="10" rx="2.5" stroke="currentColor" stroke-width="1.4"/><path d="M8.5 7.8v4.4l3.5-2.2z" fill="currentColor"/></svg>
    </button>

    <span class="mx-1 h-5 w-px bg-hairline"></span>

    <button type="button" (click)="clearFormat()" class="rte-btn" aria-label="Clear formatting">
      <svg width="16" height="16" viewBox="0 0 20 20" fill="none"><path d="M5 5h10M8 5l-2 10M14 14l3 3M17 14l-3 3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>

    @if (uploading()) {
      <span class="ml-auto flex items-center gap-1.5 pr-1 text-xs text-platinum-50">
        <svg width="13" height="13" viewBox="0 0 16 16" fill="none" class="animate-spin"><path d="M8 2V4M8 12V14M14 8H12M4 8H2M12.2426 3.75736L10.8284 5.17157M5.17157 10.8284L3.75736 12.2426M12.2426 12.2426L10.8284 10.8284M5.17157 5.17157L3.75736 3.75736" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        იტვირთება...
      </span>
    }
  </div>

  <!-- Editable area -->
  <div
    #editorEl
    class="rte-content"
    [class.rte-dragover]="dragOver()"
    (dragover)="onDragOver($event)"
    (dragleave)="onDragLeave()"
    (drop)="onDrop()"
  ></div>
</div>
