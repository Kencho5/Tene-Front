<input
  [type]="type()"
  [placeholder]="placeholder()"
  [formField]="formField()"
  [class]="customClass()"
  [attr.aria-invalid]="error() ? 'true' : null"
  [ngClass]="{
    'border-valencia-50 hover:border-valencia-50 focus:border-valencia-50 focus:ring-1 focus:ring-valencia-50':
      error(),
    'focus:border-platinum-30 focus:ring-1 focus:ring-platinum-30': !error(),
    'cursor-not-allowed': formField()().disabled(),
  }"
  class="h-[44px] w-full rounded-xl border border-hairline-strong bg-white px-3.5 py-2.5 text-platinum-100 placeholder:text-platinum-50 focus:outline-hidden"
/>
@if (error() && errorMessage()) {
<p role="alert" class="text-valencia-50 mt-1.5 flex items-center gap-1 text-xs">
  <svg class="h-3.5 w-3.5 shrink-0" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
    <circle cx="10" cy="10" r="8" />
    <path d="M10 6.5v4M10 13.5h.01" stroke-linecap="round" />
  </svg>
  {{ errorMessage() }}
</p>
}
