@if (bar.visible()) {
<div class="fixed top-[72px] right-0 left-0 z-30 bg-green-60 text-white sm:top-20">
  <a
    routerLink="/cart"
    class="block transition-all hover:brightness-95"
  >
    <div class="container flex h-7 items-center justify-center gap-3 px-10 text-xs sm:text-sm">
      @if (cartService.itemCount() === 0) {
      <span>უფასო მიწოდება <span class="font-semibold">50₾+</span> შეკვეთაზე</span>
      } @else if (cartService.qualifiesForFreeShipping()) {
      <span class="font-medium">🎉 უფასო მიწოდება გააქტიურებულია</span>
      } @else {
      <span class="whitespace-nowrap">
        დაამატეთ კიდევ
        <span class="font-semibold">{{ cartService.freeShippingRemaining() | number: "1.2-2" }}₾</span>
        უფასო მიწოდებისთვის
      </span>
      <div class="hidden h-1 w-32 shrink-0 overflow-hidden rounded-full bg-white/30 sm:block">
        <div
          class="h-full rounded-full bg-white transition-all duration-300"
          [style.width.%]="cartService.freeShippingProgress()"
        ></div>
      </div>
      }
    </div>
  </a>
  <button
    type="button"
    (click)="bar.dismiss()"
    aria-label="Close"
    class="absolute top-1/2 right-3 flex h-5 w-5 -translate-y-1/2 items-center justify-center rounded-full text-white/80 transition-colors hover:bg-white/15 hover:text-white sm:right-4"
  >
    <svg class="h-3 w-3" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M2 2l8 8M10 2l-8 8" stroke-linecap="round" />
    </svg>
  </button>
</div>
}
