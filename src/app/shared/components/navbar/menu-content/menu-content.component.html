<!-- Site links -->
<nav class="space-y-0.5 p-2">
  @for (navUrl of navUrls; track $index) {
  <a
    [routerLink]="navUrl.url"
    routerLinkActive="text-green-70"
    [routerLinkActiveOptions]="{ exact: true }"
    (click)="linkClick.emit()"
    class="text-platinum-80 hover:bg-platinum-10 hover:text-green-70 flex items-center gap-3.5 rounded-full px-3 py-2.5 text-sm font-medium transition-colors"
  >
    <svg
      class="h-5 w-5 shrink-0"
      width="20"
      height="20"
      viewBox="0 0 24 24"
      fill="none"
      stroke="currentColor"
      stroke-width="1.6"
      stroke-linecap="round"
      stroke-linejoin="round"
      aria-hidden="true"
    >
      @switch (navUrl.icon) {
        @case ('products') {
        <path d="M3.5 7.5 12 3l8.5 4.5v9L12 21l-8.5-4.5z" />
        <path d="M3.5 7.5 12 12l8.5-4.5M12 12v9" />
        }
        @case ('bins') {
        <path d="M4 7h16M9 7V5a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2" />
        <path d="M6 7l1 13h10l1-13M10 11v5M14 11v5" />
        }
        @case ('coins') {
        <ellipse cx="9" cy="7" rx="5" ry="2.5" />
        <path d="M4 7v4c0 1.4 2.2 2.5 5 2.5" />
        <ellipse cx="15" cy="14" rx="5" ry="2.5" />
        <path d="M10 14v4c0 1.4 2.2 2.5 5 2.5s5-1.1 5-2.5v-4" />
        }
        @case ('recycle') {
        <path d="M7 7l2-3.5a1.5 1.5 0 0 1 2.6 0L13 6" />
        <path d="M17.5 11l2 3.5a1.5 1.5 0 0 1-1.3 2.3H15" />
        <path d="M6.5 11l-2 3.5A1.5 1.5 0 0 0 5.8 17H9" />
        <path d="M9 17l-1.5 1.5M9 17l1.5 1.5M17.5 11l-2 .5M17.5 11l-.5 2M7 7l-2 .5M7 7l.5 2" />
        }
        @case ('earn') {
        <circle cx="12" cy="12" r="8.5" />
        <path d="M12 7.5v9M14 9.5c0-1-1-1.5-2-1.5s-2 .5-2 1.5 1 1.4 2 1.5 2 .5 2 1.5-1 1.5-2 1.5-2-.5-2-1.5" />
        }
        @case ('about') {
        <circle cx="12" cy="12" r="8.5" />
        <path d="M12 11v5M12 8h.01" />
        }
        @case ('blog') {
        <path d="M6 3.5h8l4 4v13a0 0 0 0 1 0 0H6a1 1 0 0 1-1-1V4.5a1 1 0 0 1 1-1z" />
        <path d="M14 3.5v4h4M8.5 12h7M8.5 15.5h7M8.5 8.5h2.5" />
        }
        @case ('contact') {
        <path d="M4 6.5h16v11H4z" />
        <path d="M4 7l8 6 8-6" />
        }
      }
    </svg>
    {{ navUrl.name }}
  </a>
  }
</nav>

<!-- Categories -->
<nav class="border-hairline space-y-0.5 border-t p-2">
  <p class="text-platinum-40 px-3 pt-2 pb-1 text-xs font-semibold tracking-wider uppercase">
    კატეგორიები
  </p>
  @if (categories.isLoading()) { @for (skeleton of [1, 2, 3, 4, 5, 6]; track skeleton) {
  <div class="flex items-center gap-3 px-3 py-2.5">
    <div class="bg-platinum-10 h-9 w-9 shrink-0 animate-pulse rounded-lg"></div>
    <div class="bg-platinum-10 h-3.5 w-28 animate-pulse rounded-sm"></div>
  </div>
  } } @else { @for (category of sortedCategories(); track category.id) {
  <a
    routerLink="/search"
    [queryParams]="{ parent_category_id: category.id }"
    (click)="linkClick.emit()"
    class="text-platinum-80 hover:bg-platinum-10 flex items-center justify-between gap-3 rounded-full px-3 py-2.5 transition-colors"
  >
    <div class="flex min-w-0 items-center gap-3">
      <div class="bg-platinum-10 flex h-9 w-9 shrink-0 items-center justify-center rounded-lg">
        @if (category.image_url) {
        <img
          [src]="category.image_url"
          [alt]="category.name"
          loading="lazy"
          class="h-6 w-6 object-contain opacity-0 transition-opacity duration-200"
          (load)="$event.target.classList.remove('opacity-0')"
        />
        }
      </div>
      <span class="truncate text-sm font-medium">{{ category.name }}</span>
    </div>
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
      <path
        d="M9 18L14.6854 12.7071C15.1049 12.3166 15.1049 11.6834 14.6854 11.2929L9 6"
        stroke="#D1D1D1"
        stroke-width="2"
        stroke-linecap="round"
      />
    </svg>
  </a>
  } }
</nav>
