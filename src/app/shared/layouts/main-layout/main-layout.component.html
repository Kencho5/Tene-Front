<app-free-shipping-bar />

<app-navbar />

<main
  class="relative flex-1"
  [ngClass]="
    bar.visible()
      ? 'mt-[100px] min-h-[calc(100vh-100px)] sm:mt-[108px] sm:min-h-[calc(100vh-108px)]'
      : 'mt-[72px] min-h-[calc(100vh-72px)] sm:mt-20 sm:min-h-[calc(100vh-80px)]'
  "
>
  @if (!this.loadingService.loading()) {
    <router-outlet />
    <app-footer />
  } @else {
    <div
      class="bg-background absolute inset-0 z-0 flex items-center justify-center"
    >
      <app-spinner
        [size]="46"
        [textColor]="'text-white'"
        [fillColor]="'fill-green-60'"
      />
    </div>
  }
</main>
