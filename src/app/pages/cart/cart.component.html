<div class="bg-surface-10 min-h-screen px-4 py-10 md:py-16 lg:px-0">
  @if (cartService.itemCount() > 0) {
    <div class="container mb-10 space-y-8">
      <div class="space-y-3">
        <h1 class="text-2xl md:text-4xl">ჩემი კალათა</h1>
        <p class="text-ink-50 md:text-[18px]">
          დამატებული ნივთები: {{ cartService.itemCount() }}
        </p>
      </div>

      <div class="bg-ink-20 h-px"></div>
    </div>
  }
  <div class="container flex flex-col justify-between gap-6 xl:flex-row">
    @if (cartService.itemCount() == 0) {
      <div class="mx-auto my-40 max-w-[320px] space-y-6 text-center">
        <app-image
          src="/assets/images/cart/empty-cart.webp"
          [width]="120"
          [height]="120"
          loading="lazy"
          class="mx-auto"
        />

        <div>
          <h1 class="text-xl">კალათა ცარიელია</h1>
          <p class="text-ink-50 mt-2 text-sm">
            ნივთების დამატებას შეძლებთ პროდუქტების გვერდიდან.
          </p>
        </div>

        <a
          routerLink="/products"
          class="bg-green-60 hover:bg-green-70 inline-flex h-[44px] w-full items-center justify-center gap-2 rounded-full px-6 py-3 font-medium text-white transition-colors duration-200"
          >პროდუქტების გვერდი</a
        >
      </div>
    } @else {
      <div class="flex w-full flex-col gap-4 lg:max-w-[738px]">
        @for (item of cartService.items(); track $index) {
          <app-cart-item [item]="item" />
        }
      </div>
      <app-price-summary [deliveryPrice]="0" (checkout)="handleCheckout()" />
    }
  </div>
</div>

<app-confirmation-modal
  [isOpen]="cartService.isDeleteModalOpen()"
  [title]="'ნივთის წაშლა'"
  [message]="cartService.deleteModalMessage()"
  [confirmText]="'წაშლა'"
  [cancelText]="'გაუქმება'"
  [confirmButtonGradientStart]="'#EF1E07'"
  [confirmButtonGradientEnd]="'#FF5226'"
  (confirm)="cartService.confirmDelete()"
  (cancel)="cartService.closeDeleteModal()"
/>
