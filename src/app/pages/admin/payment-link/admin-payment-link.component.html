<div class="space-y-5">
  <!-- Header -->
  <div class="flex items-center justify-between">
    <div>
      <h1 class="text-platinum-100 text-xl font-semibold">გადახდის ბმული</h1>
      <p class="text-platinum-50 mt-0.5 text-sm">
        შექმენით შეკვეთა და გაუგზავნეთ მომხმარებელს გადახდის ბმული (მოქმედებს ~10 საათი)
      </p>
    </div>
  </div>

  @if (checkoutUrl(); as url) {
  <!-- Result -->
  <div class="border-green-20 bg-green-10/40 rounded-2xl border p-5">
    <div class="text-green-80 flex items-center gap-2">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
        <path
          d="M16.667 5L7.5 14.167 3.333 10"
          stroke="currentColor"
          stroke-width="1.6"
          stroke-linecap="round"
          stroke-linejoin="round"
        />
      </svg>
      <h2 class="text-sm font-semibold">გადახდის ბმული შეიქმნა</h2>
    </div>
    <p class="text-platinum-50 mt-2 text-xs">შეკვეთის ID: {{ orderId() }}</p>

    <div class="mt-3 flex flex-col gap-2 sm:flex-row">
      <input
        type="text"
        readonly
        [value]="url"
        class="border-hairline text-platinum-100 h-[44px] w-full flex-1 rounded-xl border bg-white px-3.5 py-2.5 text-sm focus:outline-hidden"
      />
      <button
        type="button"
        (click)="copyLink()"
        class="bg-green-60 hover:bg-green-70 inline-flex h-[44px] shrink-0 items-center justify-center gap-1.5 rounded-full px-5 text-sm font-medium text-white transition-colors"
      >
        {{ copied() ? "დაკოპირდა" : "კოპირება" }}
      </button>
    </div>

    <button
      type="button"
      (click)="reset()"
      class="text-platinum-60 mt-4 text-sm font-medium underline-offset-2 hover:underline"
    >
      ახალი ბმულის შექმნა
    </button>
  </div>
  } @else {
  <form (submit)="onSubmit($event)" novalidate class="space-y-5">
    <!-- Amount -->
    <div class="border-hairline rounded-2xl border bg-white p-5">
      <h2 class="text-platinum-50 mb-4 text-sm font-semibold tracking-wider uppercase">თანხა</h2>
      <div class="flex flex-col gap-1.5 sm:max-w-xs">
        <label class="text-platinum-90 text-sm font-medium">ასაღები თანხა (₾)</label>
        <app-input [formField]="paymentLinkForm.price" type="text" placeholder="0.00" />
      </div>
    </div>

    <!-- Contact & delivery -->
    <div class="border-hairline rounded-2xl border bg-white p-5">
      <h2 class="text-platinum-50 mb-4 text-sm font-semibold tracking-wider uppercase">
        კონტაქტი და მიწოდება
      </h2>

      <div class="grid gap-4 sm:grid-cols-2">
        <app-input [formField]="paymentLinkForm.email" type="email" placeholder="ელ. ფოსტა" />
        <app-input
          [formField]="paymentLinkForm.phone_number"
          type="tel"
          placeholder="ტელეფონის ნომერი"
        />
        <div class="sm:col-span-2">
          <app-input [formField]="paymentLinkForm.address" type="text" placeholder="მისამართი" />
        </div>
      </div>
    </div>

    <!-- Comment -->
    <div class="border-hairline rounded-2xl border bg-white p-5">
      <h2 class="text-platinum-50 mb-4 text-sm font-semibold tracking-wider uppercase">
        კომენტარი
      </h2>
      <app-input [formField]="paymentLinkForm.comment" type="text" placeholder="კომენტარი" />
    </div>

    <!-- Actions -->
    <div class="flex items-center justify-end gap-3">
      <button
        type="submit"
        [disabled]="isLoading()"
        [class]="
            'inline-flex items-center gap-1.5 rounded-full px-5 py-2 text-sm font-medium text-white transition-colors ' +
            (isLoading() ? 'cursor-not-allowed bg-platinum-40' : 'bg-green-60 hover:bg-green-70')
          "
      >
        @if (isLoading()) {
        <svg width="15" height="15" viewBox="0 0 16 16" fill="none" class="animate-spin">
          <path
            d="M8 2V4M8 12V14M14 8H12M4 8H2M12.2426 3.75736L10.8284 5.17157M5.17157 10.8284L3.75736 12.2426M12.2426 12.2426L10.8284 10.8284M5.17157 5.17157L3.75736 3.75736"
            stroke="currentColor"
            stroke-width="1.5"
            stroke-linecap="round"
          />
        </svg>
        <span>მუშავდება...</span>
        } @else {
        <span>ბმულის შექმნა</span>
        }
      </button>
    </div>
  </form>
  }
</div>
