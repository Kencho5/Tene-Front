<div class="space-y-5">
  <div class="flex items-center justify-between">
    <div>
      <h1 class="text-xl font-semibold text-platinum-100">{{ pageTitle() }}</h1>
      <p class="mt-0.5 text-sm text-platinum-50">
        @if (cableType()) {
          ტიპი: {{ cableType()!.name }}
        }
        @if (isEditMode()) {
          · ID: {{ variantId() }}
        }
      </p>
    </div>
  </div>

  <form (submit)="onSubmit($event)" novalidate class="space-y-5">
    <div class="rounded-lg border border-platinum-20 bg-white p-5">
      <h2 class="mb-4 text-sm font-semibold uppercase tracking-wider text-platinum-50">
        ვარიანტის დეტალები
      </h2>

      <div class="grid grid-cols-1 gap-4 sm:grid-cols-2">
        <app-input
          [formField]="variantForm.watts"
          [error]="submitted() && variantForm.watts().invalid()"
          type="number"
          placeholder="სიმძლავრე (W) *"
        />

        <app-input
          [formField]="variantForm.length_cm"
          [error]="submitted() && variantForm.length_cm().invalid()"
          type="number"
          placeholder="სიგრძე (სმ) *"
        />

        <app-input
          [formField]="variantForm.price"
          [error]="submitted() && variantForm.price().invalid()"
          type="text"
          placeholder="ფასი (მაგ. 25.00) *"
        />

        <app-input
          [formField]="variantForm.warranty_months"
          [error]="submitted() && variantForm.warranty_months().invalid()"
          type="number"
          placeholder="გარანტია (თვე) *"
        />
      </div>
    </div>

    <div class="flex items-center justify-end gap-3">
      <button
        type="button"
        (click)="cancel()"
        class="rounded-lg border border-platinum-20 px-5 py-2 text-sm font-medium text-platinum-60 transition-colors hover:bg-platinum-10"
      >
        გაუქმება
      </button>
      <button
        type="submit"
        [disabled]="isLoading()"
        [class]="
          'inline-flex items-center gap-1.5 rounded-lg px-5 py-2 text-sm font-medium text-white transition-colors ' +
          (isLoading()
            ? 'cursor-not-allowed bg-platinum-40'
            : 'bg-green-60 hover:bg-green-70')
        "
      >
        @if (isLoading()) {
          <svg width="15" height="15" viewBox="0 0 16 16" fill="none" class="animate-spin">
            <path
              d="M8 2V4M8 12V14M14 8H12M4 8H2M12.2426 3.75736L10.8284 5.17157M5.17157 10.8284L3.75736 12.2426M12.2426 12.2426L10.8284 10.8284M5.17157 5.17157L3.75736 3.75736"
              stroke="currentColor"
              stroke-width="1.5"
              stroke-linecap="round"
            />
          </svg>
          <span>მუშავდება...</span>
        } @else {
          <span>{{ isEditMode() ? "განახლება" : "დამატება" }}</span>
        }
      </button>
    </div>
  </form>
</div>
